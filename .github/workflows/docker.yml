name: Docker Image

# Builds and pushes the Elsa 4 studio image to Docker Hub as elsaworkflows/elsa-studio.
# The Elsa major version (4) is encoded in the image tags:
#   - a GitHub Release tagged v4.0.0 produces 4.0.0, 4.0 and 4
#   - pushes to main produce latest + 4.0.0-preview.<run_number>
# Pull requests build the image (multi-arch) but do not push.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Release images are driven by GitHub Releases (tag e.g. v4.0.0): metadata-action's
  # semver strips the leading v to produce the 4.0.0 / 4.0 / 4 tags. This matches the
  # release-driven versioning in packages.yml, so both workflows agree on the tag format.
  release:
    types: [prereleased, published]

env:
  IMAGE: elsaworkflows/elsa-studio
  BASE_VERSION: '4.0.0'

jobs:
  build-and-push:
    name: Build & push elsa-studio
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend assets
        run: pnpm build

      - name: Verify Studio frontend assets
        run: test -f src/Elsa.Studio.Web/wwwroot/studio/index.html

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          labels: |
            org.opencontainers.image.title=Elsa Studio
            org.opencontainers.image.description=Elsa 4 workflow studio
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.BASE_VERSION }}-preview.${{ github.run_number }},enable={{is_default_branch}}

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Elsa.Studio.Web/Dockerfile
          # PRs never push, so don't spend minutes emulating arm64 under QEMU for a discarded build.
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
